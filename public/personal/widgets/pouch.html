  .pz-front{position:absolute;left:10px;top:0;z-index:3;pointer-events:none}
  .pz-c{z-index:2}
  @media (prefers-reduced-motion: reduce){
    .pz-card{transition:none}
  }

<script>
(function(){
  var viewport=document.getElementById('pzViewport');
  var wrap=document.getElementById('pzWrap');
  var scene=document.getElementById('pzScene');
  var cards=[1,2,3,4].map(function(n){return document.getElementById('pzC'+n);});
  var p1=document.getElementById('pzP1'),p2=document.getElementById('pzP2');
  var s1=document.getElementById('pzS1'),s2=document.getElementById('pzS2');
  var tucked=[
    'translate(96px,100px) rotate(-16deg)',
    'translate(132px,88px) rotate(-4deg)',
    'translate(168px,88px) rotate(6deg)',
    'translate(202px,100px) rotate(17deg)'
  ];
  var popped=[
    'translate(20px,18px) rotate(-16deg) scale(1.04)',
    'translate(104px,-14px) rotate(-5deg) scale(1.07)',
    'translate(188px,-14px) rotate(5deg) scale(1.07)',
    'translate(270px,18px) rotate(16deg) scale(1.04)'
  ];
  function eyes(dx,dy){
    p1.setAttribute('cx',99+dx);p1.setAttribute('cy',199+dy);
    p2.setAttribute('cx',135+dx);p2.setAttribute('cy',199+dy);
    s1.setAttribute('cx',101.2+dx);s1.setAttribute('cy',196.8+dy);
    s2.setAttribute('cx',137.2+dx);s2.setAttribute('cy',196.8+dy);
  }
  function setTucked(){
    cards.forEach(function(c,i){c.style.transform=tucked[i];});
    eyes(0,0);
  }
  function setPopped(){
    cards.forEach(function(c,i){
      c.style.transitionDelay=(i*60)+'ms';
      c.style.transform=popped[i];
    });
    eyes(-3,-7);
  }
  function unpop(){
    cards.forEach(function(c,i){c.style.transitionDelay=(i*35)+'ms';});
    setTucked();
  }
  setTucked();
  var touch=false,open=false;
  scene.addEventListener('mouseenter',function(){if(!touch)setPopped();});
  scene.addEventListener('mouseleave',function(){if(!touch)unpop();});
  scene.addEventListener('touchstart',function(){touch=true;open?unpop():setPopped();open=!open;},{passive:true});

  // the scene is a fixed-size illustration — scale the whole thing to fit
  // whatever box it's embedded in (like object-fit:contain) instead of
  // letting it overflow and get clipped by the host page.
  function fit(){
    wrap.style.transform='none';
    var w=wrap.offsetWidth,h=wrap.offsetHeight;
    if(!w||!h)return;
    var scale=Math.min(viewport.clientWidth/w,viewport.clientHeight/h);
    wrap.style.transform='scale('+scale+')';
    wrap.style.visibility='visible';
  }
  fit();
  window.addEventListener('resize',fit);
})();
</script>
