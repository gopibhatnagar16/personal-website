<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>/UNCONVENTIONAL — tile field</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400&display=swap" rel="stylesheet" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: transparent;
  }
  /* Size this container however you like — the tile grid samples its box. */
  #stage {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
  }
</style>
</head>
<body>
<div id="stage"></div>
<script>
(function () {
  "use strict";

  const TAU = Math.PI * 2;

  const ROWS = [
    {
      word: "/UNCONVENTIONAL",
      font: (px) => `400 ${px}px "Oswald", "Arial Narrow", sans-serif`,
      letterTrack: 0.02,
      fillFrac: 0.87,
      bright: true,
    },
  ];

  const REST = "oklch(0.38 0.01 263)";
  const PALETTE = [
    "#14275e",
    "#1e3a8a",
    "#1e3a8a",
    "#1d4ed8",
    "#1d4ed8",
    "#2563eb",
    "#2563eb",
    "#3b82f6",
    "#60a5fa",
    "#93c5fd",
    "#94a3b8",
    "#cbd5e1",
  ];
  const BRAND_HUE = 263;
  const GLOW_LCH = "0.42 0.07 263";
  const SPARK = "70,100,180";

  const MAXSZ = 0.9;
  const SPEED = 0.02;

  const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
  const smoothstep = (x, e0, e1) => {
    const t = clamp((x - e0) / (e1 - e0), 0, 1);
    return t * t * (3 - 2 * t);
  };
  function hash(x, y) {
    const r = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
    return r - Math.floor(r);
  }

  const HUE_STEPS = 7;
  const ALPHA_STEPS = 6;

  class TileField {
    constructor(host) {
      this.host = host;

      this.dpr = Math.min(2, window.devicePixelRatio || 1);
      this.viewW = 0;
      this.viewH = 0;
      this.cell = 10;
      this.time = 0;

      this.n = 0;
      this.px = new Float32Array(0);
      this.py = new Float32Array(0);
      this.rowOf = new Uint8Array(0);
      this.hueSeed = new Float32Array(0);
      this.spark = new Uint8Array(0);
      this.lit = new Float32Array(0);
      this.seed = new Float32Array(0);
      this.shuf = new Float32Array(0);
      this.sticker = null;

      this.hasPointer = false;
      this.rawX = 0;
      this.rawY = 0;
      this.lightX = 0;
      this.lightY = 0;
      this.lightSpeed = 0;

      this.raf = 0;

      this.stepL = new Float32Array(HUE_STEPS);
      this.stepC = new Float32Array(HUE_STEPS);

      this.canvas = document.createElement("canvas");
      this.canvas.style.cssText =
        "pointer-events:none;position:absolute;inset:0;display:block;width:100%;height:100%;";
      this.ctx = this.canvas.getContext("2d");
      this.host.appendChild(this.canvas);

      this.reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      this.onMove = this.onMove.bind(this);
      this.onLeave = this.onLeave.bind(this);
      this.frame = this.frame.bind(this);

      this.resize();

      window.addEventListener("pointermove", this.onMove, { passive: true });
      window.addEventListener("pointerleave", this.onLeave);
    }

    resize() {
      const canvas = this.canvas;
      const ctx = this.ctx;

      const rect = this.host.getBoundingClientRect();
      this.viewW = rect.width;
      this.viewH = rect.height;
      this.dpr = Math.min(2, window.devicePixelRatio || 1);
      this.cell = clamp(Math.round(this.viewW / 150), 5, 14);
      const cell = this.cell;
      const viewW = this.viewW;
      const viewH = this.viewH;
      if (viewW < 2 || viewH < 2) return;

      canvas.style.width = Math.round(viewW) + "px";
      canvas.style.height = Math.round(viewH) + "px";
      canvas.width = Math.ceil(viewW * this.dpr);
      canvas.height = Math.ceil(viewH * this.dpr);
      ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
      ctx.imageSmoothingEnabled = false;

      const splits = ROWS.length === 1 ? [1] : [0.62, 0.38];
      const bandTops = [];
      const bandHeights = [];
      let acc = 0;
      for (const frac of splits) {
        bandTops.push(acc * viewH);
        bandHeights.push(frac * viewH);
        acc += frac;
      }

      const xs = [], ys = [], rw = [], sp = [], sd = [], hs = [];

      const st = document.createElement("canvas");
      st.width = canvas.width;
      st.height = canvas.height;
      const stc = st.getContext("2d");
      stc.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
      stc.textAlign = "center";
      stc.textBaseline = "middle";

      ROWS.forEach((row, ri) => {
        const bandTop = bandTops[ri];
        const bandH = bandHeights[ri];
        const sc = document.createElement("canvas");
        sc.width = Math.max(1, Math.floor(viewW));
        sc.height = Math.max(1, Math.floor(bandH));
        const s = sc.getContext("2d", { willReadFrequently: true });
        s.fillStyle = "#000";
        s.textAlign = "center";
        s.textBaseline = "middle";

        let fs = bandH * 0.9;
        s.letterSpacing = `${row.letterTrack * fs}px`;
        s.font = row.font(fs);
        const measured = s.measureText(row.word).width || 1;
        fs *= (viewW * row.fillFrac) / measured;
        s.letterSpacing = `${row.letterTrack * fs}px`;
        s.font = row.font(fs);
        s.fillText(row.word, viewW / 2, bandH / 2);
        s.strokeStyle = "#000";
        s.lineWidth = Math.max(1, cell * 0.15);
        s.lineJoin = "round";
        s.strokeText(row.word, viewW / 2, bandH / 2);

        const R = Math.max(8, cell * 2.2);
        stc.letterSpacing = `${row.letterTrack * fs}px`;
        stc.font = row.font(fs);
        stc.strokeStyle = "#ffffff";
        stc.fillStyle = "#ffffff";
        stc.lineJoin = "round";
        stc.lineCap = "round";
        stc.lineWidth = R * 2;
        stc.strokeText(row.word, viewW / 2, bandTop + bandH / 2);
        stc.fillText(row.word, viewW / 2, bandTop + bandH / 2);

        const data = s.getImageData(0, 0, sc.width, sc.height).data;
        const alphaAt = (ax, ay) => {
          if (ax < 0 || ay < 0 || ax >= sc.width || ay >= sc.height) return 0;
          return (data[(ay * sc.width + ax) * 4 + 3] || 0) / 255;
        };
        const cols = Math.ceil(viewW / cell);
        const rows = Math.ceil(bandH / cell);
        const o = Math.max(1, Math.floor(cell / 3));
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const lx = Math.floor(c * cell + cell / 2);
            const ly = Math.floor(r * cell + cell / 2);
            if (lx >= sc.width || ly >= sc.height) continue;
            const a = Math.max(
              alphaAt(lx, ly),
              alphaAt(lx - o, ly),
              alphaAt(lx + o, ly),
              alphaAt(lx, ly - o),
              alphaAt(lx, ly + o)
            );
            if (a <= 0.35) continue;
            const gx = lx;
            const gy = ly + bandTop;
            xs.push(gx);
            ys.push(gy);
            rw.push(ri);
            sp.push(hash(gx + 7, gy - 3) > 0.82 ? 1 : 0);
            sd.push(hash(gx * 1.3, gy * 0.7));
            hs.push(hash(gx * 0.7 + 11, gy * 1.9 - 5));
          }
        }
      });

      this.n = xs.length;
      this.sticker = st;
      this.px = new Float32Array(xs);
      this.py = new Float32Array(ys);
      this.rowOf = new Uint8Array(rw);
      this.spark = new Uint8Array(sp);
      this.seed = new Float32Array(sd);
      this.hueSeed = new Float32Array(hs);
      this.lit = new Float32Array(this.n);
      this.shuf = new Float32Array(this.n);
      for (let i = 0; i < this.n; i++) this.shuf[i] = this.seed[i] * 10;

      if (this.reduced && !this.raf) this.renderStatic();
    }

    distSegSq(qx, qy, ax, ay, bx, by) {
      const dx = bx - ax, dy = by - ay;
      if (dx === 0 && dy === 0) {
        const ex = qx - ax, ey = qy - ay;
        return ex * ex + ey * ey;
      }
      const t = clamp(((qx - ax) * dx + (qy - ay) * dy) / (dx * dx + dy * dy), 0, 1);
      const ex = qx - (ax + dx * t), ey = qy - (ay + dy * t);
      return ex * ex + ey * ey;
    }

    frame(t) {
      const ctx = this.ctx;
      const { viewW, viewH, cell, n, px, py, rowOf, hueSeed, spark, lit, seed } = this;

      ctx.clearRect(0, 0, viewW, viewH);
      if (this.sticker) {
        ctx.save();
        ctx.shadowColor = "rgba(0,0,0,0.45)";
        ctx.shadowBlur = cell * 1.6;
        ctx.shadowOffsetY = cell * 0.7;
        ctx.drawImage(this.sticker, 0, 0, viewW, viewH);
        ctx.restore();
      }
      this.time += SPEED;
      const time = this.time;

      const prevX = this.lightX, prevY = this.lightY;
      if (this.hasPointer) {
        this.lightX += (this.rawX - this.lightX) * 0.5;
        this.lightY += (this.rawY - this.lightY) * 0.5;
      }
      const lightX = this.lightX, lightY = this.lightY;
      const stepDist = Math.hypot(lightX - prevX, lightY - prevY);
      this.lightSpeed = 0.9 * this.lightSpeed + 0.1 * stepDist;
      const lightSpeed = this.lightSpeed;
      const moving = this.hasPointer;

      const reach = clamp(viewH * 0.22 + lightSpeed * 0.9, viewH * 0.18, viewH * 0.42);
      const influence = 1.5 * reach;
      const influenceSq = influence * influence;
      const minX = Math.min(prevX, lightX) - influence;
      const maxX = Math.max(prevX, lightX) + influence;
      const minY = Math.min(prevY, lightY) - influence;
      const maxY = Math.max(prevY, lightY) + influence;

      const T = time;

      const P = PALETTE.length;
      const paths = Array.from({ length: P }, () => new Path2D());
      const litList = [];
      const shuf = this.shuf;
      const rad = Math.max(1, cell * 0.18);
      const hasRound = typeof Path2D.prototype.roundRect === "function";

      for (let i = 0; i < n; i++) {
        const x = px[i], y = py[i];

        let target = 0;
        if (moving && x >= minX && x <= maxX && y >= minY && y <= maxY) {
          const dSq = this.distSegSq(x, y, prevX, prevY, lightX, lightY);
          if (dSq <= influenceSq) {
            const ang = Math.atan2(y - lightY, x - lightX);
            const wobble =
              1 +
              0.30 * Math.sin(3 * ang + time * 1.6) +
              0.16 * Math.sin(5 * ang - time * 1.1 + 1.3);
            const f = clamp(1 - Math.sqrt(dSq) / (reach * wobble), 0, 1);
            target = f * f * (3 - 2 * f);
          }
        }

        const rate = target > lit[i] ? 0.35 : 0.02;
        lit[i] += (target - lit[i]) * rate;

        shuf[i] += (0.55 + 9 * lit[i]) * 0.016;
        const k = Math.floor(shuf[i]);
        const idx = Math.floor(hash(i * 0.713 + k * 1.37, k * 0.291 + seed[i] * 5.1) * P) % P;

        const sz = cell * 0.98;
        const h = sz / 2;
        const p = paths[idx];
        if (hasRound) p.roundRect(x - h, y - h, sz, sz, rad);
        else p.rect(x - h, y - h, sz, sz);

        if (lit[i] > 0.02) litList.push(i);
      }

      for (let pi = 0; pi < P; pi++) {
        ctx.fillStyle = PALETTE[pi];
        ctx.fill(paths[pi]);
      }

      for (const i of litList) {
        const L = lit[i];
        const x = px[i], y = py[i];
        const sz = cell * 0.98;
        const h = sz / 2;
        ctx.fillStyle = `rgba(255,255,255,${(0.3 * L).toFixed(3)})`;
        if (hasRound) {
          const p2 = new Path2D();
          p2.roundRect(x - h, y - h, sz, sz, rad);
          ctx.fill(p2);
        } else {
          ctx.fillRect(x - h, y - h, sz, sz);
        }
      }

      this.raf = requestAnimationFrame(this.frame);
    }

    renderStatic() {
      const ctx = this.ctx;
      ctx.clearRect(0, 0, this.viewW, this.viewH);
      if (this.sticker) {
        ctx.save();
        ctx.shadowColor = "rgba(0,0,0,0.45)";
        ctx.shadowBlur = this.cell * 1.6;
        ctx.shadowOffsetY = this.cell * 0.7;
        ctx.drawImage(this.sticker, 0, 0, this.viewW, this.viewH);
        ctx.restore();
      }
      const rad = Math.max(1, this.cell * 0.18);
      const hasRound = typeof Path2D.prototype.roundRect === "function";
      for (let i = 0; i < this.n; i++) {
        const sz = this.cell * 0.98;
        const h = sz / 2;
        const idx = Math.floor(this.seed[i] * PALETTE.length) % PALETTE.length;
        ctx.fillStyle = PALETTE[idx];
        if (hasRound) {
          const p = new Path2D();
          p.roundRect(this.px[i] - h, this.py[i] - h, sz, sz, rad);
          ctx.fill(p);
        } else {
          ctx.fillRect(this.px[i] - h, this.py[i] - h, sz, sz);
        }
      }
    }

    onMove(e) {
      const rect = this.canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      if (x >= -40 && y >= -40 && x <= rect.width + 40 && y <= rect.height + 40) {
        if (!this.hasPointer) {
          this.hasPointer = true;
          this.lightX = x;
          this.lightY = y;
          this.lightSpeed = 0;
        }
        this.rawX = x;
        this.rawY = y;
      } else {
        this.hasPointer = false;
      }
    }

    onLeave() {
      this.hasPointer = false;
    }

    start() {
      if (this.reduced) return;
      if (!this.raf) this.raf = requestAnimationFrame(this.frame);
    }

    stop() {
      if (this.raf) cancelAnimationFrame(this.raf);
      this.raf = 0;
    }

    destroy() {
      this.stop();
      window.removeEventListener("pointermove", this.onMove);
      window.removeEventListener("pointerleave", this.onLeave);
      this.canvas.remove();
    }
  }

  const stage = document.getElementById("stage");
  let field = null;

  const boot = () => {
    field = new TileField(stage);
    field.start();
  };

  if (document.fonts && document.fonts.load) {
    Promise.all([
      document.fonts.load('400 100px "Oswald"'),
      document.fonts.ready,
    ]).then(boot).catch(boot);
  } else {
    boot();
  }

  let pending = 0;
  window.addEventListener("resize", () => {
    if (!field) return;
    cancelAnimationFrame(pending);
    pending = requestAnimationFrame(() => field.resize());
  });
})();
</script>
</body>
</html>
